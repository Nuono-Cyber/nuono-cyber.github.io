services:
  - type: web
    name: nuono-app
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disks:
      - name: sqlite-data
        mountPath: /opt/render/project/src/server/data
        sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 8787
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: FORCE_RESET_SUPER_ADMIN_PASSWORD
        value: "false"
      - key: EXPOSE_RESET_LINK
        value: "false"
