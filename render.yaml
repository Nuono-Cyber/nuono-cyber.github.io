services:
  - type: web
    name: nuono-app
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 8787
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://nuono-cyber.github.io"
      - key: SUPABASE_TIMEOUT_MS
        value: "15000"
      - key: FORCE_RESET_SUPER_ADMIN_PASSWORD
        value: "false"
      - key: FORCE_SUPER_ADMIN_PASSWORD
        value: "false"
      - key: EXPOSE_RESET_LINK
        value: "false"
      - key: META_MEDIA_LIMIT
        value: "500"
      - key: META_INSIGHTS_CONCURRENCY
        value: "5"
