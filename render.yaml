services:
  - type: web
    name: nuono-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 8787
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://nuono-cyber.github.io,http://localhost:5173,http://127.0.0.1:5173
      - key: FORCE_RESET_SUPER_ADMIN_PASSWORD
        value: "false"
      - key: EXPOSE_RESET_LINK
        value: "false"
